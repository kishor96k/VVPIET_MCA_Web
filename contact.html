<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>



<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">VVPIET</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="admissions.html">Admissions</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="col-md-6 offset-md-3">
        <div class="container mt-5">
            <h2 class="text-center text-dark">Contact Us</h2>

            <form class="p-4 bg-white rounded shadow">
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label"><strong>First Name :</strong></label>
                        <input type="text" class="form-control" placeholder="enter first name">
                    </div>

                    <div class="col mb-3">
                        <label class="form-label"><strong>Name :</strong></label>
                        <input type="text" class="form-control" placeholder="enter last name">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><strong>Email :</strong></label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>

                <div class="col mb-3">
                    <label class="form-label"><strong>Profession :</strong></label><br>

                    <input class="form-check-input" type="radio" name="radioDefault">
                    <label> Professor</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioDefault" checked>
                    <label class="form-check-label"> Student</label>
                </div>

                <div class="mb-3">
                    <label class="form-label"><strong>Message :</strong></label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>

                <button class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">© 2026 VVPIET College | All Rights Reserved</p>
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
