<!DOCTYPE html>

        <div class="d-flex gap-2 justify-content-center mt-4">

            <video class="rounded-4 m-2" style="width:300px; height:300px; object-fit:cover;" controls>

            <video class="rounded-4 m-2" style="width:300px; height:300px; object-fit:cover;" controls>
